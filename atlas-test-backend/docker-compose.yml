version: '3.9'
services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    depends_on:
      - qdrant
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      Qdrant__BaseUrl: http://qdrant:6333
      Data__TicketsFilePath: tickets.json
      Data__GoldenEvalFilePath: golden_eval.json
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../atlas-test-frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  qdrant_storage:

